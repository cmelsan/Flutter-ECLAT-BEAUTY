name: eclat_beauty
description: "ÉCLAT Beauty - Tienda de belleza premium"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Models & Serialization
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Supabase
  supabase_flutter: ^2.8.4

  # Navigation
  go_router: ^14.8.1

  # HTTP
  http: ^1.6.0

  # Functional Programming
  dartz: ^0.10.1

  # Stripe Payments
  flutter_stripe: ^11.4.0

  # Image Handling
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

  # UI
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  flutter_staggered_grid_view: ^0.7.0
  badges: ^3.1.2
  webview_flutter: ^4.10.0

  # Utils
  intl: ^0.20.2
  uuid: ^4.5.3
  url_launcher: ^6.3.2
  connectivity_plus: ^6.1.0
  flutter_dotenv: ^5.2.1

  cupertino_icons: ^1.0.8
  data_table_2: ^2.7.2
  fl_chart: ^1.1.1
  timeago: ^3.7.1
  flutter_image_compress: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.6.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - .env
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
